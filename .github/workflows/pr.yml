name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Run linter
        run: |
          if [ "$(node -p "Boolean(require('./package.json').scripts?.lint)")" = "true" ] && \
             { [ -f "eslint.config.js" ] || [ -f "eslint.config.mjs" ] || [ -f "eslint.config.cjs" ] || [ -f ".eslintrc" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.cjs" ] || [ -f ".eslintrc.json" ] || [ -f ".eslintrc.yml" ] || [ -f ".eslintrc.yaml" ]; }; then
            npm run lint
          else
            echo "No usable ESLint setup found, skipping lint step."
          fi

      - name: Run tests
        run: |
          if [ "$(node -p "Boolean(require('./package.json').scripts?.test)")" = "true" ]; then
            npm test
          else
            echo "No test script found, skipping tests."
          fi

      - name: Package extension
        run: npx vsce package

      - name: Validate package
        run: |
          echo "Checking if VSIX package was created..."
          if ls ./*.vsix 1> /dev/null 2>&1; then
            echo "VSIX package found:"
            ls -la ./*.vsix

            echo "Package contents:"
            npx vsce ls ./*.vsix
          else
            echo "No VSIX package found"
            exit 1
          fi

      - name: Upload compiled output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compiled-output-${{ github.run_number }}
          path: |
            out/
            dist/
          retention-days: 7

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vscode-extension-${{ github.run_number }}
          path: "*.vsix"
          retention-days: 30

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            npm-debug.log*
            yarn-error.log*
            .npm/_logs/
          retention-days: 7
